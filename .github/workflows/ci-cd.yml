name: Microservices CI/CD

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      eureka: ${{ steps.filter.outputs.eureka }}
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      meeting: ${{ steps.filter.outputs.meeting }}
      chat: ${{ steps.filter.outputs.chat }}
      media: ${{ steps.filter.outputs.media }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            eureka:
              - 'backend/eureka-server/**'
            gateway:
              - 'backend/api-gateway/**'
              - 'backend/common/**'
            identity:
              - 'backend/identity-service/**'
              - 'backend/common/**'
            meeting:
              - 'backend/meeting-service/**'
              - 'backend/common/**'
            chat:
              - 'backend/chat-service/**'
              - 'backend/common/**'
            media:
              - 'backend/media-service/**'
              - 'backend/common/**'

  build-and-push-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-frontend:latest ./frontend
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-frontend:latest

  build-and-push-eureka:
    needs: changes
    if: ${{ needs.changes.outputs.eureka == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -pl eureka-server -am -DskipTests
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-eureka:latest ./backend/eureka-server
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-eureka:latest

  build-and-push-identity:
    needs: changes
    if: ${{ needs.changes.outputs.identity == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -pl identity-service -am -DskipTests
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-identity:latest ./backend/identity-service
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-identity:latest

  build-and-push-gateway:
    needs: changes
    if: ${{ needs.changes.outputs.gateway == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -pl api-gateway -am -DskipTests
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-gateway:latest ./backend/api-gateway
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-gateway:latest

  build-and-push-meeting:
    needs: changes
    if: ${{ needs.changes.outputs.meeting == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -pl meeting-service -am -DskipTests
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-meeting:latest ./backend/meeting-service
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-meeting:latest

  build-and-push-chat:
    needs: changes
    if: ${{ needs.changes.outputs.chat == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -pl chat-service -am -DskipTests
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-chat:latest ./backend/chat-service
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-chat:latest

  build-and-push-media:
    needs: changes
    if: ${{ needs.changes.outputs.media == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -pl media-service -am -DskipTests
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ptitmeet-media:latest ./backend/media-service
      - name: Push to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ptitmeet-media:latest

  deploy-to-ec2:
    needs: [build-and-push-frontend, build-and-push-eureka, build-and-push-identity, build-and-push-gateway, build-and-push-meeting, build-and-push-chat, build-and-push-media]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment script on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/ptitmeet
            # Pull all updated images
            docker-compose pull
            # Start updated containers without restarting others
            docker-compose up -d
