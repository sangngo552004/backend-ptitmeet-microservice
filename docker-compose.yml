version: '3.8'
services:
  # Redis cho Identity Service (token store)
  redis:
    image: redis:7.2-alpine
    container_name: ptitmeet-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ptitmeet-network

  # Apache Kafka (KRaft mode — không cần Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: ptitmeet-kafka
    ports:
      - "9092:9092"
      - "9101:9101" # JMX (optional, debug)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ptitmeet-network
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    container_name: ptitmeet-eureka
    ports:
      - "8761:8761"
    environment:
      - _JAVA_OPTIONS=-Xms256m -Xmx256m
    networks:
      - ptitmeet-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ptitmeet-api-gateway
    ports:
      - "8080:8080"
    environment:
      - _JAVA_OPTIONS=-Xms256m -Xmx256m
      - EUREKA_HOST=eureka-server
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - eureka-server
      - redis
    networks:
      - ptitmeet-network

  identity-service:
    build: ./identity-service
    container_name: ptitmeet-identity
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - _JAVA_OPTIONS=-Xms256m -Xmx256m
      - EUREKA_HOST=eureka-server
      - SPRING_DATASOURCE_URL=${DB_IDENTITY_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_IDENTITY_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_IDENTITY_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    depends_on:
      - eureka-server
      - redis
    networks:
      - ptitmeet-network

  meeting-service:
    build:
      context: .
      dockerfile: meeting-service/Dockerfile
    container_name: ptitmeet-meeting
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      - _JAVA_OPTIONS=-Xms256m -Xmx256m
      - EUREKA_HOST=eureka-server
      - SPRING_DATASOURCE_URL=${DB_MEETING_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_MEETING_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_MEETING_PASSWORD}
      - LIVEKIT_HOST=${LIVEKIT_HOST}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_WSURL=${LIVEKIT_WSURL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - GRPC_IDENTITY_ADDRESS=static://identity-service:9081
      - GRPC_CHAT_ADDRESS=static://chat-service:9083
      - GRPC_MEDIA_ADDRESS=static://media-service:9084
    depends_on:
      - eureka-server
      - identity-service
      - chat-service
      - media-service
      - kafka
    networks:
      - ptitmeet-network

  chat-service:
    build: ./chat-service
    container_name: ptitmeet-chat
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - _JAVA_OPTIONS=-Xms256m -Xmx256m
      - EUREKA_HOST=eureka-server
      - SPRING_DATA_MONGODB_URI=${MONGO_URI}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - eureka-server
      - kafka
    networks:
      - ptitmeet-network

  media-service:
    build: ./media-service
    container_name: ptitmeet-media
    ports:
      - "8084:8084"
      - "9084:9084"
    environment:
      - _JAVA_OPTIONS=-Xms256m -Xmx256m
      - EUREKA_HOST=eureka-server
      - SPRING_DATASOURCE_URL=${DB_MEDIA_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_MEDIA_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_MEDIA_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - LIVEKIT_HOST=${LIVEKIT_HOST}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_LIVEKIT_RECORD_DOMAIN=${S3_LIVEKIT_RECORD_DOMAIN}
      - MEETING_SERVICE_URL=http://meeting-service:8082
      - GRPC_MEETING_ADDRESS=static://meeting-service:9082
    depends_on:
      - eureka-server
      - kafka
    networks:
      - ptitmeet-network

volumes:
  redis_data:
  kafka_data:

networks:
  ptitmeet-network:
    driver: bridge