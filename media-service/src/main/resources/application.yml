server:
  port: 8084

spring:
  application:
    name: media-service
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DB_MEDIA_URL}
    username: ${DB_MEDIA_USERNAME}
    password: ${DB_MEDIA_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

livekit:
  host: ${LIVEKIT_HOST:http://localhost:7880}
  api-key: ${LIVEKIT_API_KEY:devkey}
  api-secret: ${LIVEKIT_API_SECRET:secret}

aws:
  s3:
    enabled: true
    bucket: ${S3_BUCKET:ptitmeet-recordings}
    region: ${S3_REGION:ap-southeast-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    endpoint: ${S3_ENDPOINT:}
    livekit-record-domain: ${S3_LIVEKIT_RECORD_DOMAIN:}

services:
  meeting-url: ${MEETING_SERVICE_URL:http://localhost:8082}

grpc:
  server:
    port: 9084
  client:
    meeting-grpc-client:
      address: static://localhost:9082
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
