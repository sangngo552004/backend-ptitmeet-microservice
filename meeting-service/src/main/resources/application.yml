server:
  port: 8082

logging:
  level:
    com.ptitmeet.meeting: DEBUG

grpc:
  server:
    port: 9082
  client:
    identity-grpc-client:
      address: static://localhost:9081
      negotiation-type: plaintext
    chat-grpc-client:
      address: static://localhost:9083
      negotiation-type: plaintext
    media-grpc-client:
      address: static://localhost:9084
      negotiation-type: plaintext

spring:
  application:
    name: meeting-service
  datasource:
    url: jdbc:mysql://${MYSQL_MEETING_HOST:localhost}:${MYSQL_MEETING_PORT:3308}/ptitmeet_meeting_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:ptitmeet_root_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

livekit:
  host: ${LIVEKIT_HOST:http://localhost:7880}
  api-key: ${LIVEKIT_API_KEY:devkey}
  api-secret: ${LIVEKIT_API_SECRET:secret}
  ws-url: ${LIVEKIT_WSURL:}

# Services URLs (cho Phase 10 gRPC, để placeholder)
services:
  identity-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  chat-url: ${CHAT_SERVICE_URL:http://localhost:8083}
  media-url: ${MEDIA_SERVICE_URL:http://localhost:8084}
